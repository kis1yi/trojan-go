version: "2"

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - depguard
    - gocritic
    - govet
    - ineffassign
    - misspell
    - unconvert
    - whitespace
  exclusions:
    paths:
      - \.pb\.go$
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/kis1yi/trojan-go
            - github.com/DATA-DOG/go-sqlmock

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    paths:
      - \.pb\.go$
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/kis1yi/trojan-go)
    goimports:
      local-prefixes:
        - github.com/kis1yi/trojan-go
